                    - button [ref=f13e376] [cursor=pointer]:
                      - img [ref=f13e377]
                  - text: "Блин, да даже такой «ноунэймовый бездарь» как я, и то провёл десятки часов в гугле, читая про самые разные художественные приёмы или анализы культовых художественных произведений, с которыми я даже не знаком, просто потому что мне были интересны чувства и мысли авторов самих эссе, ведь их можно использовать в качестве вдохновения. Примерно столько же времени я потратил в гугле для того, чтобы читать о разных животных и растениях, для того чтобы лучше продумать инопланетян моего сеттинга, сделав их уникальными и интересными. Во время работы я в среднем трачу по 3-5 часов в день для того, чтобы сделать от двух до пяти страниц, в среднем на одну главу моего ориджинала уходит от трёх дней до недели, от четырёх до семи недель на главу, в случае моего непубликуемого проекта. Даже в контексте данной статьи, первая часть писалась 6 часов к ряду с одним перерывом на 20 минут, и дописывалась в два часа ночи. Вторая часть писалась два или три дня к ряду (в том числе, потому что мне надо было самому с дополнительными материалами ознакомиться), притом что я занимался только этим, и закончил я её только в 5 утра. Эта часть вообще в страшных муках рождается уже неделю (и я её хотел удалить несколько раз), на данный момент я не спал больше суток и на моих часах 23.58, потому что я уже задолбался над ней работать, я хочу чтобы это кончилось уже наконец, чем быстрее тем лучше. Я успел выпить один энергетик, и две кружки кофе, у меня болит башка, я хочу спать, глаза слипаются, я в данный момент близок к тому чтобы употребить кофеин внутривенно, но вместо того, чтобы просто расслабиться, я блять продолжаю печатать данный текст, потому что боюсь потерять ту самую «линию мысли». Ну, вы знаете, мне кажется, у всех, кто занимается творчеством достаточно долго был этот тупой момент, когда какая то клёвая идея пришла в голову, когда ты уже ночью разделся и лёг под одеялко, поленился встать и записать идею, а в итоге на следующее утро полностью её забыл… Я, при всём при этом, всё ещё считаю, что глобально я делаю недостаточно, искренне считаю себя ленивой жопой, но, хэй, это не я тут ставлю пафосные цитатки о превозмогании у себя в телеге. Моя сестра художница, одновременно учится на медицинском, работает кассиром в магазе, и поверх этого даже она, возвращаясь в общагу ближе к одиннадцати вечера, всё равно находит время на то, чтобы порисовать, просто порисовать без коммишек, просто ради удовольствия и набивания руки (ну и тг канала на 30 подписчиков), стабильно почти каждый день недели сон ей только снится, она продолжает всем этим заниматься, лелея мечту, когда-нибудь нарисовать свою мангу, она совмещает это с любовью к пению и вокальными выступлениями на разных мероприятиях. Моя бета может высказаться за себя сама. «Итак. Раз дали такую возможность, то… Я человек с более чем средней нагрузкой в учёбе и просто жизни, лол. Прикованность к жизни в четырёх стенах (зачастую), как ни странно, не даёт мне всех просторов и а-ля много свободного времени, которое себе сначала представляют многие люди, когда я им говорю о таких условиях. Как-то выходит так, что я дрейфую между тем, чтоб и дома всё успевать, и быть отличницей, много чего ещё, и параллельно заниматься фикрайтерством. Я искренне люблю своё дело. Не скрываю, что по жизни я распиздяй, вроде тоже ленива не на шутку, но и просто болт забивать на то, что я делаю, у меня не получается. Так и выходит, что если есть идея, мысль, желание, в конце концов, либо мне всю ночь не спать, учитывая, что только тогда меня оставляют в покое и я могу с удовольствием уделить время процессу, либо… про писанину в тетрадях слышали? Которая происходит в порыве вдохновения без возможности хоть телефон в руки взять. Иногда я трачу время ещё на то, чтобы перенести с бумаги тонну текстов в редактор на ноут, делая это, естественно, вручную. Самое главное, что я в это душу вкладываю, потом часами докапываюсь до каждой своей ошибки, исправляю… Вроде столько мороки, но мне нравится! Это банальная разгрузка от основных жизненных проблем, как и у любого другого творческого человека, и очень жалко, если это не ценится, верно?». Я уверен, какие-то свои истории о настоящем и тяжком художественном труде есть у каждого из вас, или даже просто, блин, о любом другом реальном труде, который, ну, знаете, требует существенных усилий. Это я всё к чему: можете считать, что я драматизирую, но я искренне нахожу тезис «промпт — тоже труд» откровенно оскорбительным по отношению к любым творцам, которые действительно стараются, страдают, пишут кровью, да и просто вкладывают душу. Подобные заявления обесценивают даже не просто творческий труд, а само блин понятие труда."
                  - paragraph [ref=f13e379]: ПОТОК СОЗНАНИЯ (РАДИ ЭТОГО МЫ ЗДЕСЬ)
                  - text: "Ну, вот и пришло время шмалять из собранного нами арсенала Чехова. Сейчас я сделаю то, чего пытался не делать в предыдущих главах — я собираюсь взывать к вашим чувствам, а не к вашему разуму. Давайте я раскрою сейчас все карты, и признаюсь. В момент написания этой части статьи я испытываю творческое выгорание. Ну вы знаете: «Я бездарь! Я трачу столько сил и все равно никому не нужен! Я бесполезный кусок мяса!» — вот эта вот вся срань, довольно мерзкая штука. Сейчас, я могу сидеть перед текстовым редактором часами и просто тратить время в никуда, потому что получается у меня только кое-как напечатать пару небольших абзацев, качество которых меня абсолютно не удовлетворяет. Я не получаю удовольствие от процесса, я скорее постоянно думаю о свих проколах и проблемах (не только из моей творческой жизни…). Я намного активнее занимаюсь самобичеванием. А статистика моих работ висит над моей самооценкой как дамоклов меч. Я бесконечно прокручиваю в своей башке критические комментарии от незнакомых людей, мнение которых я даже не воспринимаю всерьёз, как из-за несостоятельности их тезисов, так и из-за того, что они сами понаписали. Обычно во время творчества я просто отдаюсь своим чувствам, и придаю потоку моих мыслей и эмоций форму в виде текста, слушая своё сердце, но сейчас я просто ничего не чувствую. Я ненавижу этот мир, я ненавижу себя, я ненавижу свою жизнь, я ненавижу своё творчество, я ненавижу даже самый обычный солнечный день, потому что теперь для меня солнышко это не «полезная штука, без которой всё на земле сгинет» а «гнусная гнида, которая выжигает мне глаза, если я иду в магаз по неподходящей тропинке»."
