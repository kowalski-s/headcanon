                      - img [ref=f13e346]
                  - text: "Я имею в виду, в этом сблёве каждая драка это просто «два скучных додика машут друг перед другом заточкой, пока гг конечно же не победит. Иногда два додика ещё призывают армию друг против друга, потому что призыв армии у гг это очень логично для параши, которая буквально называется, блять, поднятие уровня в одиночку», без интересной хореографии, без какой-то стратегии и интеллектуальных игр, без интересных способностей, без напряжения, без шуток, так как всё происходит на зверски серьёзных щах, и даже блять без какой-либо поражающей воображение анимации, хотя фанатики данного щииидевра оправдываются именно тем, что «ну это просто тупой боевичёк». Ни у одного из создателей не было цели сделать любой из вышеупомянутых аспектов хорошо, у них была цель со всех сторон облизывать главного героя, проговаривая устами всех, кто его окружает «какой же он охуенный, хочу быть как он», я уже сказал, с какой целью это было сделано. Ну знаете, вот эта вот структура подобия сюжета, когда «в начале он был никем. Но потом именно он оказался избранником, который достоин получить уникальную и исключительную способность, доступную лишь ему одному. А потом на него обращают внимание сильнейшие бойцы Кореи, каждый из которых чуть ли кончает от одного его вида, элита не может ступить и шагу без помощи гг, ведь только пока он рядом, они не мрут как мухи, но особенно от него оргазмирует, естественно, сильнейшая охотница Кореи, которая потом будет его женой. Роза нашего протагониста ну просто не могла цвести для недостаточно элитных отбросов, ведь конечно же по нему и так течёт каждая женщина». Это просто сериал, который объективно сделан по всем фронтам либо посредственно, либо ужасно, но школьникам нравится (у них банально вкус ещё не сформирован, так что простительно, половозрелые же фанаты подобного… боюсь, потеряны навсегда). Сторону хороших сериалов представит «легенда о Вокс Махине». Это экранизация того, как несколько профессиональных актёров озвучки стримили то, как просто играли вместе в DnD, а потом заливали это на ютуб… да, я знаю, что начало не впечатляющее, но импровизации восьми актёров озвучки, во время игры в настолку, и то имеют большую художественную ценность (у меня почему то есть подозрения, что даже с учётом меньшего бюджета…). Это история о том, как кучка, мягко говоря, не идеальных придурков, фриков да и просто чем-то травмированных личностей, волею судеб сбиваются в одну банду приключенцев, которая, просто пытаясь выжить, вляпывается во всякий пиздец, случайно спасая мир в процессе… что они делают, стебя друг друга и зачастую откровенно тупя, делая какую-то хрень. Другими словами, это набор живых персонажей, которые могут быть очень круты в своей сфере (особенно во время экшена), но всё ещё имеющих ярко выраженные недостатки и проблемы, которые необходимо преодолеть, у них в целом у всех есть ярко выраженные характеры, и куча своих ярких моментов (есть, например, сцена, в которой командный «танк», чтобы спасти остальных от кислоты, которая заполняет комнату, тупо прыгнул в эту самую кислоту и поплыл к рычагу, который кислоту может остановить…), как следствие, за этими дебилами на самом деле довольно интересно следить (особенно за Персивалем, обожаю Перси). А экшен-то какой там сочный! для начала он есть практически в каждой серии (если не в каждой), при этом герои в нём активно используют свои уникальные способности и задействуют необычное окружение, часто имеют дополнительные задачи, добавляющих дополнительные слои напряжения, при этом они постоянно работают в команде, а ещё главгероям каждый раз надо натурально ПРЕВОЗМОГАТЬ, ибо для них даже рядовые противники могут стать тем ещё испытанием за преодолением которого хочется следить, потому что им постоянно приходится импровизировать на ходу, выдумывая способ выжить и победить (ну знаете, ёбаная минимальная база экшена, которую не понимают ни авторы тысячи мусорных фанфиков про попаданцев с меткой «боевик», ни авторы сололевелинга, ЧТОБЫ ЗА ДЕЙСТВИЕМ БЫЛО ИНТЕРЕСНО СЛЕДИТЬ, НУЖНО ПРЕОДОЛЕНИЕ РЕАЛЬНО ВЕСОМЫХ ИСПЫТАНИЙ). Грёбанные ДнД стримеры почему-то даже на нормальную анимацию не поскупились При всём при этом, данный сериал не воспринимает себя слишком серьёзно, там много шуток, половина из них про письки, НО это смешные шутки про письки! Там есть абсолютно восхитительная сцена, в которой двое из главных героев для того, чтобы убить дракона, влетают в него через анус и реально режут его изнутри! И это тактика даже работает до поры до времени! А ещё один из актёров, который играет там командного барда, просто в какой то момент подумал «а может, я чисто по приколу реально напишу и спою несколько песен для сериала, раз у меня персонаж бард?» и это в итоге реально хорошие песни, которые всегда уместны! А ещё там целая куча крутых визуальных решений с точки зрения работы режиссёра. А ещё там есть просто охуенная драка, во время которой в самом мире сериала вышеупомянутый бард играет рок на лютне! А ещё там есть самая хорошо сделанная арка мести из всех, которые я видел в медиа! А ещё там есть самая странная сцена лесбийского поцелуя, которую я видел… я даже не знаю, как к ней относиться, но наверное всё-таки посмеюсь. А ещё… эх, ну короче, я могу очень долго говорить об этом сериале, он не идеальный, отдельные сюжетные линии проработаны меньше, чем хотелось бы, но он просто безумно весёлый и душевный, тут прям чувствуется, что создатели горели своим делом и просто кайфовали в процессе работы, а как следствие, их сериал довольно прочно и уверенно засел в моём сердечке, ведь по совокупности всех своих достоинств, он дал мне то, что не давала ни одна другая история с которой я знаком (и даже те, в которых я участвовал, мои собственные игры в ДнД были как будто бы о другом…). О Вокс Махине, по крайней мере в СНГ, почти никто не знает. Солокач — это крайне хайповый высер, с миллиардом эдитов, кучей школьников, которые его защищают, и блять, что самое кошмарное, наградами от официальной аниме премии, включая блять лучший экшен! лучший сериал!! И лучший главный герой!!! А Сон Джин Ву — это настолько непрописанное чмо, что даже на фанатской вики в разделе «личность» про него люди ничего по фактам сказать не могут, и начинается: «он не отличается высокомерием и общается вежливо, но при этом он крайне уверен в себе и над противниками издевается. Наверное, он самоотвержен, потому что телепортировался спасать такую-то группку дебилов, но именно из-за него они и оказались на грани гибели, потому что изначально мудак их просто так кинул без каких-либо весомых причин. Он доброжелателен, но вот вам несколько моментов, где он ради выгоды убивал людей, или просто смотрел на то, как их избивают и убивают, чтобы более пафосно влезть в замес, когда уже поздно и спасти положение, в котором он же и виноват». Притом в категории «лучший персонаж» он конкурировал с Фрирен и Мао Мао из Монолога фармацевта (кто понял, тот понял)."
