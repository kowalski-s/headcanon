                    - button [ref=f13e392] [cursor=pointer]:
                      - img [ref=f13e393]
                  - text: "Понимаете, раньше я мог буквально в пустоту печатать кучу текста, во времена когда у меня было два лайка, один от сестры, второй от придурка, который попросил у меня отзывообмен, но отзыв свой так и не оставил (я всё ещё тебя помню, мудила). Я мог часами сидеть над одной сценой и по-настоящему кайфовать от шуток, которые я туда добавлял, от ярких метафор, от того, что прикольные образы персонажей из моей башки обретают форму, да в принципе от того, что форму начинает обретать то, что вот я сам придумал своей СДВГшной головой, а не кто-то там из-за океана (почти всё медиа, с которым я знакомлюсь — иностранное). Раньше я всё это мог делать в условиях с двумя лайками, когда у меня буквально 0 просмотров даже в дни выхода новых глав, я получал за довольно дорогое промо по 2-3 лайка и то не гарантировано (последний раз, когда я применял промо, он принёс мне 0). Я воспринимал как самый настоящий праздник любой намёк на движение от тех трёх с половиной землекопов, которые меня таки заметили, потому что, как известно, читатели откажутся хоть что-то говорить в отзывах даже если их подвергнуть пыткам ЦРУ из Гуантанамо (даже если им всё нравится). Ну в общем, условия были полной хуйнёй, но я продолжал. Потому что мне просто нравился сам процесс, я искренне люблю творчество как явление в целом. Я стараюсь знакомиться с разными видами медиа, и в разных жанрах. Я постоянно читаю разные статьи о творчестве. Я смотрю обзоры на книги и кино ну ютубе, хотя я не читаю книги и не смотрю кино, потому что просто любопытно, какие там тренды в этих индустриях, и какие клёвые задумки там появляются. Понимаете, я и сам хочу вернуть себе внутренний огонь, который, говоря метафорически, позволял мне играть панк-рок в пустом зале, выводя какое-то ебануто-крутое гитарное соло, которое мне настолько нравится, что я во время него кричу собственно: «Guitar solo fuck, yeah!!!» и не боюсь выглядеть идиотом, потому что я в этот момент слишком хорош, чтобы обращать внимание на такие мелочи, как музыкальный вкус неудовлетворённого уборщика, являющегося моей единственной аудиторией. Но я не могу просто взять и сделать это. И это угнетает меня ещё больше, ну знаете, мозг подкидывает мне мысли из разряда «дедлайны и так горят, а ты разнылся!» или «тебе надо сделать сейчас не так уж и много! Сцены уже полностью продуманы, ну так напиши их!» или даже «целых 10 человек (примерно), собранных без учёта обмена отзывами, ждут!». Есть такое ощущение, что чем больше я об этом думаю, тем глубже себя закапываю Это всё вообще не что-то рациональное. Разумом я понимаю, что я не так уж и плох, что я уже многое сделал, что большинство ориджиналов дальше пяти лайков не заходит, я даже придерживаюсь мысли, что продлится это моё негативное состояние неделю или две, и что мне просто надо немного отдохнуть, но вот сейчас это просто ужасно. Вам может показаться, что этот поток сознания откровенно бесполезен в контексте статьи о нейросетях. Кто-то из вас даже может обвинить меня в том, что я злостно использую свою самую успешную работу, как платформу для того, чтобы просто выговориться. Но я с помощью всего этого хочу обнажить перед вами мой образ мышления и донести, что мне реально не безразлично то, что я делаю как и искусство в целом, а ещё, я хочу использовать это для того, чтобы более ярко донести до вас две мысли. Во-первых, я призываю вас ценить и уважать те вещи, которые этого действительно заслуживают. Я мог бы много распинаться о том, как много для любого автора значит любой актив под его работами (даже на уровне хотя бы немых лайков), о том, что если мы будем давать больше внимание стоящим вещам, то их может стать больше, так как у авторов будет мотивация их делать, превозмогая все сложности. Но я прекрасно понимаю, что половине прочитавших это глубоко поебать на чувства каких-то там авторов, с которыми они лично не знакомы, поэтому я скажу, что более осознанный подход к тому, на что вы тратите своё время, это прежде всего вопрос уважения к самому себе. Не просто потому что глубокие произведения способны заставить вас о чём-то задуматься, или как-то там изменить вашу душу, но потому что даже просто развлекательные тайтлы, сделанные с душой, банально сильнее вас развлекут. Пустая жвачка выветрится из головы быстро, сочная конфетка останется с вами надолго, как сама по себе, так и в плане последующей её жизни в том же фэндоме. Удивительно, но хорошие штуки — это более хороший материал для последующего фанатского развития. Я также прекрасно понимаю, что формы развлечения бывают разными, кто-то, вон, даже хорроры считает развлекательным жанром, и что в тех вещах, которые в целом сделаны средненько, могут быть отдельные очень цепляющие моменты. Моя единственная фандомная работа по Отелю Хазбин, единственное, что в этом сериале сделано не через жопу — это песни. Никто в здравом уме не будет запрещать вам любить именно эти вещи, но, пожалуйста, старайтесь всё же воспринимать тайтлы объективно, хваля то, что сделано хорошо, но ругая то, что объективно сделано плохо. В моём выше упомянутом Guilty Pleasure, в лице Hsr, по очевидным причинам Хоё очень много вкладывается в их персонажей, в дизайн, в озвучку, какой-то уникальный геймплей и прочее, и я ценю это, ведь для меня персонажи это самая важная часть любого произведения. Тем не менее я считаю что даже там есть персонажи действительно прописанные, имеющие хороший дизайн, необычные фишки, и за которыми как следствие реально хочется следить (Кафка, Авантюрин, Фэй Сяо, Бутхил. Со мной многие не согласятся, но Раппа и Топаз), а есть бездушные и чисто коммерческие куски уныния, диалоги с которыми хочется пропускать (Цзинь Лю, Светлячок, Касторис, Юнь Ли, Серебряный волк, Фу Сюань, многие на это разозлятся, но Дань Хэн). И хоть у нас, в виду разных вкусов у разных людей, нет какого-то универсального мерила того, как мы можем понять то, является ли произведение хорошим ещё до знакомства с ним, но зато теперь у нас есть замечательный указатель на то, что можно не тратить своё время на произведение. Да, товарищи, я говорю о свидетельствах использования ИИ. Нейронщики могут бесконечно вертеться как уж на сковородке, но что бы они не делали, использование ИИ уже навсегда останется синонимом: наплевательского отношения, халтуры и бездарности. В конце концов, если автор не хотел это писать, то зачем мне это читать? Можете подобрать соответствующие синонимы для других форм медиа."
