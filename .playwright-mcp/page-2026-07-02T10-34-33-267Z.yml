                  - text: Отдельный мем — это реакция ведущего, который и объявил часть из этих наград, месье Гигук, вы можете знать его по таким великим изречениям как «витюберы — это просто реслинг с вайфу ©» и «о боже, не цитируйте меня ©». Он англоязычный аниме-блогер, который относит себя к тем, кому нравится сололевелинг, даже он знатно охуел, когда ему подложили свинью, заставив объявлять эту награду, он просто стоял с лицом, которое очень ярко выражало эмоцию «вы что, угораете?!» Как следствие, я вопрошаю, где же справедливость? (*7) Почему, несмотря на то, что вы на том же ютубе тупо не найдёте положительный обзор, этот ёбаный позор аниме сообщества не просто существует, но ещё и получает тотально незаслуженное признание? Это замечательный пример того, что людям при правильном маркетинге можно продать вообще любое дерьмище, и своя аудитория найдётся. Важно отметить, я не называю всех фанатов этого сериала говноедами хотя мне порой хочется, просто сама проблема того, что искать хорошие тайтлы сложнее, распространяется не только на фикбук, это нечто глобальное. Я просто искренне считаю, что как минимум часть фанбазы подобного — это такие же жертвы ситуации, которым этот сериал просто не с чем сравнивать, а когда тебе тайтл не с чем сравнивать, он по умолчанию будет казаться лучше, чем он есть на самом деле. Собственно, для того, чтобы у вас точно было с чем сравнивать, можете сравнить экшен сцену из куска параши (https://www.youtube.com/watch?v=IrHTT2IEKpE&t=386s) И из хорошего сериала, я аж залип на 5 пересмотров, пока ссылку искал (https://www.youtube.com/watch?v=tq8aGaDXCxk) Вот заодно сцена с проникновением в дракона, чтобы оправдать новые метки (https://www.youtube.com/watch?v=l1pvRXt03eY) Вот действительно хорошая драка из действительно хорошего аниме-сериала, там правда уже есть полноценный сюжет, но почему-то бюджета на экшен всё равно хватило (https://www.youtube.com/watch?v=nJlmcQA_dVQ) Из того же сериала, но ещё лучше (https://www.youtube.com/watch?v=Ar7fHWRMNoE) И ещё одна из моб психо 100, но я его обожаю просто (https://www.youtube.com/watch?v=bzs5Lszo-4E) Вот вам экшен из другого хайпового аниме, которое как минимум не является говном, которое ещё и выходить начало рядом с сололевелингом, чтобы не оставлять ему вообще никаких шансов на искупление видимо (https://www.youtube.com/watch?v=NvcYfsSTzG4) И ещё оттуда (https://www.youtube.com/watch?v=uNrsMRIOnwQ) И ещё больше (https://www.youtube.com/watch?v=k18gSPjWDM0)
                  - paragraph [ref=f13e363]: Промпт — тоже труд
                  - text: "Знаете, данный тезис для меня — это прям как анекдот про лупу и пупу, ну то есть каждый раз, когда я слышу, мне просто безумно смешно, но если слушать эту бредятину каждый день, то смех станет каким-то нервным. Ну вы знаете, у нас есть самые разные примеры художественного труда. Толкин провёл масштабную исследовательскую работу нескольких разных мифологий и языков для того, чтобы расписать историю вымышленного мира на несколько тысяч лет. Руководствуясь своим лингвистическим образованием, он придумал несколько вымышленных языков, исходя из которых придумывались все имена эльфов или гномов. В рамках своего вымышленного мира, он создал сюжет настолько хороший в своей основе, что до сих пор, спустя почти век после выхода его произведений, большинство фэнтези авторов в любом медиа в той или иной мере опираются на его придумки. В зависимости от перспективы говорящего, разные люди могут как в положительном так и негативном ключе сказать, что его сильмалирион — это в большей степени научная работа, чем художественное произведение. Хоть я и не фанат рэпа из-за русских «музыкантов», но Эминем в нищете, в условиях ненависти к белому жителю чёрного гетто (когда его буквально могли избить за слишком плохой рэп или просто за то, что он был белым в пятницу вечером), целыми днями он цитата из одной документалки «часами перед телевизором качался в такт музыке, чтобы начать чувствовать ритм», заполнял целые ящики бумагой, на которой он заносил все приходящие ему в голову идеи, в течение месяцев он сидел и заучивал словари для того, чтобы максимально развить свой словарный запас, не говоря уже об имевшихся у него трудностях с наркозависимостью, которые он так же преодолел. Он является одним из самых известных рэперов, если не самым известным. Он буквально способен обходными путями рифмовать слова, которые ни с чем не рифмуются, не говоря уже про его меметичную способность петь семь слов в секунду. Нейрофикрайтерка пишет в описании своего тг канала: «Писать с помощью ИИ на самом деле очень легко. Ты просто садишься перед чатом ГПТ и начинаешь истекать кровью», — отсылаясь к цитате Рэда Смита «Писать легко. Ты просто садишься за машинку и вскрываешь себе вены», подразумевая колоссальные страдания и максимальный ментальный надрыв во время процесса своего творчества, как бы говоря: «я тоже пишу кровью». В этом же тг канале, среди плеяды кринжовых нейромемов, есть пост, в котором в качестве примера своего «творческого процесса» она демонстрирует, как получила от ИИ текст, скопировала его, закинула в нейросеть снова, но добавила в запрос, цитата: *убери «искусственность текста», чтобы это не выглядело как текст, сгенерированный искусственным интеллектом. Старайся придерживаться стиля Анджея Сапковского*, в своём гайде по использовании нейросетей она предложила даже шапку фанфика заполнять с помощью нейросетей (шапку блять! (шапку нахуй!!)). Absolute cinema, до слёз (от смеха, от смеха…). Только попробуйте мне сказать, что вы как минимум не ухмыльнулись на этом моменте, это попросту нелепо, ну невозможно воспринимать всерьёз эти вещи, пока в одном ряду. Тут кто-то из вас может обвинить меня в гнусной манипуляции, да и вообще заявить мне, что «сравнивать фикрайтеров с серьёзными авторами это бесполезно, мы тут просто дурью маемся». На что я отвечу тем, что Фикбук, как и любая другая платформа для фикрайтеров, это просто место, где могут публиковаться принципиально любые авторы, включая действительно крутых уже сейчас, и даже будущих знаменитостей, которые пока что просто отрабатывают навыки на фанфикшине (я и сам рассчитываю на что-то подобное), так что давайте и данный «беспрецедентный труд» мы будем оценивать в контексте всех тех фикрайтеров, которые могут стараться не меньше, а то и больше, чем профессиональные сценаристы и писатели. Ну то есть довольно низко мы ценим нейротруд, он такой же фальшивый, как любой другой результат работы ИИ."
