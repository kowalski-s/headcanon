                        - heading "Танцуй со мной" [level=4] [ref=f13e405]
                    - button [ref=f13e407] [cursor=pointer]:
                      - img [ref=f13e408]
                  - text: "В этом плане за попытками нейроавторов оправдываться наблюдать довольно потешно. Ну, знаете, когда люди пишут, что никто не должен докапываться до их «инструментов», да и вообще, это просто средство для рассказа прекрасных историй, но при этом они же стыдливо не указывают ИИ метки и пытаются факт применения нейросетей как-то скрыть, хотя, казалось бы, если ИИ настолько прекрасен, и это всем должно быть очевидно, то почему они не выставляют это наверх, как предмет гордости, ммм? Я имею в виду, адепты нейросетей зачастую абсолютно не стараются даже над банальными спорами вокруг нашего объекта обсуждения. Где бы нейросрачи не видел, на Ютубе, на Фикбуке, на новостных ресурсах, везде они используют в основном либо легко бьющиеся аргументы, которые я уже разбирал во всей статье до этого, либо пытаются оперировать дешёвыми манипулятивными ходами всех инфантильных людей, вступающих в споры в интернетиках, пытаясь критиковать личность, а не тезисы. А поскольку мои потенциальные хэйтеры, которых почему-то до сих пор нет, и так предпочитают использовать материал, приготовленный кем-то ещё, то давайте я сам напишу для малюток аргументы против меня. Для вас же стараюсь, экономлю вам время, пользуйтесь: «ну ты токсик, тебя можно и не слушать»; «ну так сам говоришь, что тебя никто не читает, значит пишешь говно и твоё мнение можно не учитывать»; «тебе нравится хср, у тебя у самого нет вкуса и твоё мнение можно не учитывать»; «ну ты же сказал, что в отдельных мелочах применял ИИ… ЗНАЧИТ ТЫ ОДИН ИЗ НАС, ЛИЦЕМЕР!»; «мне просто всё равно, я творю только для себя (но при этом публикуюсь на публичной платформе, очевидно рассчитывая на внимание, и я отвечаю тебе вместо того, чтобы пройти мимо, потому что ты и твоё мнение абсолютно мне безразличны! так и знай!)»; «вот тут у тебя есть одна фактическая ошибка, значит вообще всю остальную статью можно не воспринимать всерьёз». Для второй мысли, которую я хотел передать, я, продолжая свою музыкальную метафору про около пустой зал, хочу кинуть микрофон в мою почти пустующую зрительскую трибуну, не потому что я хочу разбить голову одному из моих слушателей, но потому что я хочу дать им возможность и повод высказаться. Высказаться о многом: о своём мнении, о своём отношении к теме в целом и отдельных тезисах, высказаться о своей боли, высказаться о своих страхах, высказаться о своих чувствах, и сделать всё это глобально, не только у меня. Истина рождается и распространяется там, где есть обсуждение, если вы согласны со мной, позвольте большему количеству людей узнать о нашей позиции; если вы не согласны со мной, то дискутируйте, но действительно адекватными и разумными методами, кто знает, вдруг у вас получиться хоть кого-то переубедить; если мой поток сознания отозвался в вашем сердце, то расскажите про свой опыт и проблемы, чтобы быть услышанными и получить поддержку; если вам нравится непопулярный автор, то не бойтесь выражать это, вы даже не представляете, какую поддержку способны оказать парой кликов или одним сообщением, и я сейчас говорю даже не о себе (но с другой стороны, если вы посмотрите и мои художественные работы, это конечно будет приятно…), вы можете обратить внимание на мою сестру художницу (ссылка на её тг у меня в профиле), вы можете обратить внимание на мою бету, вы можете обратить внимание на любого автора, который отметился у меня в комментариях. Не факт, что каждый из них пишет нечто подходящее вам, но зато, скорее всего, эти люди уважают себя и свою аудиторию в достаточной мере, чтобы банально постараться писать своими руками. Не бойтесь быть искренними, ведь искренность и рождает ту самую «душу» комментариев произведений и вообще; не бойтесь менять своё мнение, ведь настоящий мастер и мудрец — это просто вечный ученик; не бойтесь потенциального осуждения, ведь только сделав первый шаг, можно будет получить хейт… ровно как и одобрение; не бойтесь сложных амбиций, ведь, как известно, всё великое начинается с малого; не бойтесь экспериментов, ведь они — источник знаний; не бойтесь ошибаться, ведь не ошибается только тот, кто ничего не делает; не бойтесь боли, ведь это всё равно неизбежная часть любого пути, учиться трудно, работать сложно, ошибаться неприятно, но в данном случае пункт назначения придаёт смысл дороге к нему; не бойтесь… бояться, это нормально испытывать страх перед любым публичным действием, все через это проходят, это свидетельство того, что вам банально не безразлично то, что вы делаете, по той же причине не бойтесь и грустить."
                  - paragraph [ref=f13e410]: ПОСЛЕСЛОВИЕ (ОТГОЛОСОК ВЫРЕЗАННОГО КОНТЕНТА…)
                  - text: "Знаете, я не буду делать вид, что что творчество автора, который больше старался, автоматически становится лучше, или даже, что оно автоматически привлекает к себе больше внимания. Я сейчас говорю даже не о себе, но это просто факт, что мы просто не можем подсчитать количество всех тех работ, которые получают меньше внимания, чем заслуживают. С другой стороны, мы можем также перечислить множество откровенного мусора, который как раз получает намного больше внимания, чем заслуживает на деле (вышеупомянутый сололевелинг). Но знаете, между старательно сделанным популярным произведением, и популярной мусорной жвачкой всё же есть разница в их восприятии фанбазой. И те и другие получают много как позитивного отклика, так и негативного. Но если в случае старательного произведения потребители обычно излагают свои мысли достаточно развёрнуто, и в ответ на такие же развернутые негативные комментарии вступают в целые баталии, то в случае популярной жвачки… хе-хе, тут уже развернуто мысли излагают только хейтеры, тогда как фанаты в своём восторге ограничиваются односложными и короткими сообщениями, соответствующими уровню стараний над тем, что они комментируют, ну то есть: «гуд; хорошо; заебись; норм», а в ответ на критику просто говорят «нет, это ты какашка». Сами решайте, какая фанбаза ценнее, даже если порой вторая больше, но первая преданнее. Ну а закончить я хочу на очевидно риторическом вопросе. Может ли автор вызвать по-настоящему сильные чувства произведением, которое он даже не хотел самостоятельно создать? Ну а теперь, когда я по всем правилам хороших эссе сделал в конце лиричный вопрос «на подумать» в тему материала, я могу уже с чистой совестью пойти лечиться, дочитывая Ван Пис с середины до онгоинга, ведь это очевидно очень рациональная трата времени."
