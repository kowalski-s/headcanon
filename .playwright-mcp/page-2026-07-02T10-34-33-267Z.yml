                  - text: И ведь, хватает же у них, блять, наглости то самое «копирование промпта» считать плагиатом и обижаться на это, хотя, казалось бы, все их недокарьеры построены на воровстве и присвоении себе не своего труда. Так что, мои дорогие нейроавторы, если вам грустно из-за того, что кто-то нехороший скопировал ваш промпт, и получил результат лучше/больше признания, потратив на это меньше пяти минут, я могу с чистым сердцем и такой же совестью сказать, что мне НИ-ХУ-Я вас не жаль, получите то, что заслужили.
                  - paragraph [ref=f13e316]: ИИ — ЭТО БУДУЩЕЕ (ДАЖЕ ЕСЛИ ДА, ТО КАКОЕ-ТО КРИНЖОВОЕ)
                  - text: "«За ИИ будущее! Ты просто луддит, который не понимает, как пользоваться новыми технологиями!». Знаете, это тоже такая постоянно повторяемая хрень, которая раньше меня веселила, но сейчас доводит до белого каления. Я имею в виду, вам не кажутся как минимум наивными люди, которые неиронично считают, что вот именно они какие-то особенные, уникальные, прям-таки избранники богов, наделённые тайным знанием, которых окружает какое-то необразованное отребье, неспособное познать всё величие AI. Ну, по крайней мере именно такое впечатление на меня производят люди, которые буквально игнорируют тысячи разных доводов, отвечая на них высокомерным «ты просто не понял». Они ведь никогда даже не задумаются над тем, что их оппоненты могли потратить столько же (если не больше) времени и сил на изучение их дойной коровы, и просто, блин, абсолютно искренне остаться неудовлетворёнными результатом. Они же ну прям как инфантильные подростки, которые в 16 лет уже считают себя гениальными и зрелыми художниками, философами, политологами, психологами, да и вообще кем угодно, злясь на толпу «этих грязных тупых нормисов, которым нужна та клятая душа произведения, что это вообще такое?! это съедобно?». Я ведь даже не просто какой-то одинокий фриковатый шиз радикал. Как среди читателей, так и авторов есть множество людей, которые высказывались на тему в похожем ключе, в том числе среди намного более больших и уважаемых авторов, чем я. Ну знаете, из разряда таких, чьё мнение воспринимается намного более серьёзно, в рамках данной статьи из как-либо отметившихся (не только комментаторы, но и те, кто более анонимно отмечались в публичной бете, или даже говорили со мной в личке/под другими работами) под прошлыми частями собралась целая коллекция из людей с самой разной направленностью, и уровнем популярности, там в том числе персоны с работами на тысячу лайков. Кого там только нет: k-поперы, анимешники, геймеры, китаисты, омегаверсеры и прочие (и это ещё без учёта тех людей, на которых я ссылался в дополнительных материалах, но там вообще люди крупнее любого фикбукера). (*5) Но что я нахожу намного более важным: у нас до сих пор нет примеров конвенционально уважаемых и по-настоящему популярных работ, сделанных по большей части с помощью нейросетей. Сами по себе технологии машинного обучения существуют ещё чуть ли не с прошлого века, непосредственно Open AI первые разработки начала вести в 2015 году, выпустив первые из них в публичную бету в 2016 году. В том виде, который мы знаем сегодня, нейросети появились и стали общедоступными в конце 2022 года, ну то есть они с нами уже три полных года… так где же оно? почему каждый раз, когда нейросети мелькают в новостях, касающихся творчества, это «Творец х негативно высказался об ИИ» или «Мегакорпорации опять охуели, требуя денег за нейрослоп» или «Ничего не понимающие в своей сфере критики, почему-то выступающие судьями, снова продвинули на первое место какого-то конкурса очевидный мусор, теперь с нейрослопом, а потом убрали его, потому что случился скандал». Вам не кажется, что даже те же мегакорпы, имея достаточно много денег и целый штат сотрудников, уже легко могли бы сделать далеко не один пример качественного нейро-\"творчества\"? Тем более, что некоторые из них уже сейчас вливают кучу денег в нейросети. Так почему мы всё равно получаем исключительно слоп с приставкой нейро? Почему о том, насколько ИИ прекрасен, пишут в основном авторы непритязательной порнушки, у которых в работах каждый раз половина меток (если не больше) — это метки, связанные с сексом? Где же те самые божественные ИИ-работы, которые заставят наконец меня и моих единомышленников заткнуться? (качеством работы ИИ по части клубнички я, кстати, тоже недоволен, но мне лень в это углубляться сейчас. Может быть отдельную главу сделаю если вам это будет интересно). Кроме того, на деле ИИ не очень-то работает даже в сферах с творчеством не связанными. Я уже во второй части, в дополнительных материалах, ссылался на два видео, в которых эта тема раскрывается подробнее, но кто вообще реально знакомится с дополнительными материалами в любом публицистическом тексте? Я более чем уверен, что ни один препод даже не заглядывал в данный раздел моего дипломника, не говоря уже о курсачах, так что давайте перескажу кратко. Стартаперы начали сходить с ума и пытаются засунуть ИИ буквально куда угодно, начиная с «о май гад, ИИ-коляска для младенца, которая сама настраивает скорость своего движения» и заканчивая скам-проектами «этот ошейник переведёт «слова» вашего питомца или ребёнка, чтобы вы понимали, что он от вас хочет», ничего реально полезного не создают, но успех имеют, так как инвесторы пока клюют из-за безумной шумихи вокруг нейронок. Но нейропроекты от корпораций тоже успехом не пользуются. Гугл пытался создать ассистента, который мог бы помогать в разных мелких делах, в итоге почти в половине случаев приходилось подключать мясного ассистента, проект прикрыли. Амазон пытались создать технологию, которая способна оплачивать товар за пользователя, в итоге этим на деле занимались дешёвые индусы (буквально), на технологию в итоге забили… Это я всё к тому, что нейросети сейчас — это просто безумно переоценённая технология, спектр реальных возможностей которой настолько же безумно ограничен. Учитывая то, сколько миллиардов в сферу было влито, результат как-то вообще не впечатляет."
                  - paragraph [ref=f13e317]: Я ПРОСТО ВЕСЕЛЮСЬ, ОТСТАНЬ
                  - text: Это пункт, по которому я наверное скажу самую контроверсивную вещь, которая многих может удивить, но меня прям-таки заебало уже то, как много людей оправдывают просмотр и создание всякого ширпотреба тем, что «да это просто тупое развлечение, отключи мозг и расслабься».
