                      - img [ref=f13e298]
                  - text: "У некоторых из вас по первой части данной статьи и моим комментариям могло сложиться впечатление, будто я какой-то интеллигентный молодой человек, который разве что урывками может позволить себе такие непотребные деяния, как мат или странные шутки и поведение. Но я уже лечу на крыльях ночи, потому что хочу поскорее вас разочаровать. Я человек, который может и почитывает порой какие-то философские статьи/анализы рядом с разбором психологию по юнгу, однако я смешиваю их с просмотром нарезок деград отряда на ютубе (это их буквальное название, если что), прожиганием жизни за игрой в Honkai: Star Rail (Кафка вернись в сюжет и выпади мне на все недостающие эйдолоны в одной десятке), а мой счёт смертей во время отдельных босс-файтов в Hollow Knight: Silksong идёт буквально на десятки. Другими словами, я долбоёб (специально загуглил, чтобы узнать, что оно пишется через «о», а не через «а»), будем теперь знакомы получше. И именно в контексте всего этого, вы не должны быть удивлены тому, что я решил воскресить эту статью спустя месяц (1*). «Что это за грёбанная звёздочка?!» — вопрошаете вы наверняка. Ответ в том, что я получал некоторые комментарии, обвиняющие меня в недостатке структурности и упорядоченности в данной статье, а значит передо мной появилась необходимость более явно обозначить ту красную нить, которая связывает воедино на первый взгляд разрозненные мысли этой главы. Другими словами, я решил таким образом обозначать чеховские ружья, которые все вместе выстрелят почти одновременно в кульминационной точке данного материала (2*). Кроме того отмечу сразу, внутри я сегодня не такой весёлый и тактичный, как раньше. Я сейчас более пассивно-агрессивный, и меньше слежу за языком, так как у меня сейчас эмоциональный диапазон, который вы испытываете при просмотре «Реквиема по мечте» (отчасти по некоторым причинам, которые я не хочу разглашать, отчасти из-за того, что я всё-таки обозначу во второй половине. 3*) Некоторым из вас может показаться, что для ощущений, описанных в предыдущем абзаце, я уже показал слишком много петросянства, в конце концов, я уже даже на данной платформе встречал такое явление, когда юные душою эксперты (точнее считающие себя такими, вероятно после просмотра одного поверхностного ролика на ютубе на 10 минут от Правого полушария интроверта) принижают чужую трагедию из-за того, что жертва ведёт себя каким-то неожиданным для юной особы образом. Некоторые почему-то до сих пор не знают, что разные люди по-разному справляются со своими травмами и проблемами, в том числе и с помощью тупых шуточек, ведь забиться в угол чтобы поплакать — это вариант может и более очевидный, но подходящий всё-таки не всем. Так что, давайте мы будем уважать чужие формы страданий. В конце концов, что может быть веселее, чем, высунув голову в окно машины, катиться на полной скорости прямиком в предсказуемый ад? Но не буду больше вас задерживать. Если вкратце, то сегодня я хочу доразобрать некоторые аргументы нейронщиков, которых я до этого касался вскользь, либо не касался вообще. Не просто чтобы полить ещё немного воды на тему, в которой согласные покивают головой, а несогласные всё равно пройдут мимо (или попытаются спорить с названием статьи, лол), моя цель сейчас скорее в том, чтобы через призму нейросетей затронуть более комплексную тему, дабы передать более важное послание. Так или иначе, на столе для препарирования у нас сегодня: «ИИ — это просто инструмент!»; «за ИИ будущее! Ты просто луддит, который не понимает, как пользоваться новыми технологиями!»; «Я просто веселюсь! Чего ты докопался?!»; и самое сладкое: «ну вообще-то промпт написать — это тоже труд!». Не будем больше терпеть весь этот гнусный пиздёж! Я имею в виду — это то, что можно увидеть чуть ли не каждый раз, когда об ИИ заходит речь, и парировать каждый из этих аргументов задача так-то элементарная. Ну а теперь, погрузимся же в данный необязательный экспериментальный спин-офф."
                  - paragraph [ref=f13e300]: ПРОСТО «ИНСТРУМЕНТ» (ДЕ-ФАКТО ВАЖНЕЕ ПОЛЬЗОВАТЕЛЯ)
                  - text: "Это то, что нейронщики упорно повторяют, наверное, чаще любого другого тезиса, отчаянно отказываясь принимать то, что ну не работает это как инструмент, когда ваш «инструмент» делает буквально всю работу за вас! Ведь в противном случае разрушится сладкая делюзия того, что можно практически не стараться, и всё равно получать высокий результат (увы, ребятки, это эксклюзив только для детей миллиардеров 4*). Я имею в виду, в случае текстового творчества (и тут уже не важно, писатель вы, сценарист, или, упаси ктулху, текстовый блогер/журналист, представляющий журнал садоводов), опытный и горящий своим делом автор чуть ли не каждое слово может подбирать с какой-то определённой целью, чтобы их порядок порождал синергичную симфонию, и каждая строчка сочилась от особого стиля. Тут уже не важно, за счёт чего достигается та самая индивидуальность, она даже не всегда бывает положительная, важно то, что она формируется буквально каждую минуту во время вашего творческого акта… до тех пор, пока творческий акт именно ваш. Нейроавторы не подбирают рифму или метафоры; они не формируют какой-то особый стиль, разве что выбирают, какой стиль сегодня воровать в средненьком варианте (**1, тоже ружьё, но рванёт пораньше остальных); они не могут реализовать что-то относительно новое и не имеющее множества референсов, они сами себе обрезают практику, они банально не учатся складывать слова в предложения… и так далее, буквально всё внутреннее и действительно имеющее ценность содержание делается их неодушевлённым рабом (ну или костылём, кому какое сравнение больше нравится). В других творческих сферах всё примерно так же, но я слишком сильно углубляться в это не хочу, у меня недостаточно компетенции. Также у нас есть уже классический пример: «Заберите у художника кисть с красками, он будет выводить новый шедевр углём по стене, да хоть кровью, которая у него через нос пошла», в случае писателей можно сказать: «заберите у него гугл-доки, он будет писать шедевр на бересте. Можете забрать у него бересту и сломать руки, но он будет диктовать текст помощнику, если это для него действительно важно». Продолжая эту метафору: «заберите у нейронщика компьютер, и он станет бесполезен, как тест на беременность на девятом месяце». Почему у нас вообще появился этот миф, что человек, который буквально просто пишет указку для набора нулей и единиц, считается автором? Что он, блин, сделал для такого гордого статуса? Пил кофе и пялил в монитор? Человек, который получил от кого-то или чего-то материал, и подретушировал его — это не автор, это редактор. Но вот беда, редакторы может и важны, но их не указывают на обложках или постерах, они прозябают в тени, как герои невидимого фронта, а честная скромность не позволит нашим пациентам греться в лучах фальшивой славы, которую они никогда не смогут на все 100% назвать своей. Отсюда и идут корни ментальной гимнастики, призванной хоть как-то придать нейроопусам значимость, никто даже не задумается о том, зачем вообще во всей этой истории промпт-инженеры, когда для повторения большей части их «достижений» достаточно скопировать их промпт."
