                      - img [ref=f13e331]
                  - text: Не поймите меня неправильно, я не какой-то ханжа с возвышенным вкусом, который свысока смотрит на всех, кто посмел слушать что-то кроме Моцарта, смотреть что-то кроме пьес Шекспира, и читать что-то кроме Достоевского. Это подход тех самых инфантильных подростков, которые в отчаянных попытках выделиться начинают страдать какой-то хернёй ради дешёвых понтов. Объективно, ни один человек не способен постоянно потреблять исключительно какое-то «возвышенное» медиа, даже среди людей с хорошим вкусом, и среди авторов, которые стараются делать что-то посерьёзнее; кто говорит обратное, тот пиздабол. Все мы люди, у каждого есть какое-то своё guilty pleasure (я вон выше уже признался, что связан с хсром, это позор, от которого уже не отмыться…), это нормально. Вон на фикбуке процветает однотипное PWP либо с корейцами, либо с ебучей драмионой. Однако, я сейчас, конечно, могу многих шокировать, сказав довольно очевидную вещь, но даже простенькие развлекательные произведения «на отключить мозг» делятся на хорошие, сделанные с душой тайтлы (которые делать, кстати, нихуя не просто), и бездушную убогую срань. Давайте просто признаем, что большая часть эротики банально скучная и одинаковая, а их авторы зачастую не имеют даже базового представления об анатомии (как и о сексе, ахах), свои нишевые шедевры действительно работающие как развлечение имеются конечно, но они скорее исключение, давайте заодно также просто признаем, что больше всего секс-контента по факту пишут школьники, что и является одной из причин грустной статистики в этом плане. Вы и сами можете догадаться, какое место тут занимают нейроработы. (вот кстати, для полноты картины, PWP, который я считаю неплохим, и который я уже упоминал в первой части https://ficbook.net/readfic/018a13c1-1359-722c-a5b3-c5a40f4a8e18) Некоторые тут конечно могут сказать, ну выпускают они свою посредственную нейропорнушку, да и пусть, не каждый же обязан выпускать шедевры. Запретить им выпускать свои работы просто невозможно, да и было бы странным мувом, НО тут как раз и начинаются проблемы, как для авторов, которые пытаются выпускать что-то серьёзное, так и для читателей, которые хотят почитать что-то сложнее, чем «Чингачгук трахнул Шарангыса». Платформа тупо засрана, любые другие работы просто тонут в этом потоке, особенно в случае новичков, особенно в случае ориджиналов… а теперь поток преумножен ещё и бездарями с нейросетями под рукой. (у меня, если честно, есть впечатление, что даже те самые хорошие PWP, и PWP, которые находятся в топах — это разные понятия…). Меня это затрагивает сразу на двух уровнях. Во-первых, мой любимый автор на фикбуке в какой-то момент полностью ушёл с платформы, потому что он чувствовал, что получает недостаточно отдачи по отношению к своему творчеству относительно того, что у нас таки получает максимум отдачи. А он писал не просто там «хорошие фанфики», он писал великолепные фанфики, которые по своему качеству в принципе уделывают 80% даже профессионально сделанного коммерческого медиа (как минимум один его фанфик экшуали лучше оригинала), по моим ощущениям его работы настолько хороши, что их можно читать даже без знания оригинала. Но знаете, если бы я посмотрел на то, как мой труд, совершаемый вопреки дислексии, получал бы 450 или 1500 лайков в течение нескольких лет, когда PWP по BTS на две страницы, накаляканное за вечер, такое же количество набирает за неделю, то я бы тоже расстроился. (вот его профиль, увы, неактивный https://ficbook.net/authors/997575) Во-вторых, по своему опыту работы с оригинальным макси дженом, я могу сказать вам, что попытки продвигать что-то своё (без ста меток секса) — это просто сплошной ад и пиздец, без какой-либо радости и намёков на надежду. Платформа выебет тебя буквально нулём просмотров по умолчанию, столько же даст с горячих работ, потом пренебрежительно кинет тебе в рыло 2-3 лайка за промо, которое вообще не оправдывает свою цену (я подбирал неудачные дни, но как бы, а как я, будучи новичком, должен был узнать, что это неудачные дни?) и ноль коментов даже от тех, кто всё-таки обратит на тебя внимание. Потом ты посмотришь на отзывообмены и, в итоге, один мудак просто на тебя забьёт, второй кинет в тебя нейроотзывом, третий прочтёт только пролог на пару страниц, но отправит читать тебя все 10, четвёртый решит поиграть в критика с изысканным вкусом, не понимая при этом базовые принципы сторителлинга и поведение людей, и примерно каждый, даже оставивший положительный отзыв, на тебя забьёт, как только отзыв будет отправлен, из-за чего они останутся просто мёртвыми бесполезными душами, повезёт ещё, если кто-то из них спустя неделю не уберёт свои лайки и прочее. Нет, серьёзно, я могу вам аки Осаму Дазай (реальный, а не анимешный) расписать целую «Исповедь неполноценного автора». Каждый раз, когда я захожу в раздел «топ», мне хочется прокусить себе вены (вроде раньше он назывался «популярное»), потому что мне от всего моего положения хочется только кричать, но мой крик никто даже не услышит. (*6) Я ведь даже не пишу какой-то концептуальный и сложный арт-хаус с глубокой философией, у меня довольно простая по форме и подаче история, в понятном всем сеттинге задрипаной шараги, в которой ты вынужден учиться учебного заведения для разных слоёв населения, но с щепоточкой магии. В общем, можете преумножить все эти проблемы ещё в два или три раза в случае всяких панков нонкомформистов, у которых каждая строчка — сложный эксперимент. Теперь давайте для полноты картины я также приведу два примера мультсериалов «на отключить мозг и расслабиться», один из которых кринжовый мусор, а другое, ну… хороший сериал (увы, они экшоновые, а значит немного мимо кассы основной аудитории фикбука, но я в первую очередь подумал о них, а с романтикой знаком не настолько хорошо). Сторону бездушной и убогой ссанины будет представлять такое аниме, как «Сололевелинг», ну или же «Поднятие уровня в одиночку» (да-да, аниме это тоже мультики, даже сами японцы так считают, хватит искусственно возвышать аниме в отдельную форму медиа), как бы вам описать его… в сущности своей это максимально типичный и убогий сблёв, который во всём своём естестве полностью посвящён тому, как тотально пустой главный герой нагибает всё, что движется, чтобы закомплексованные неудачники могли представлять на его месте себя, без сюжета, без прописанных персонажей, без сеттинга, и даже, блять, без хороших экшен сцен и анимации (вы и на фикбуке вероятно такое видели).
