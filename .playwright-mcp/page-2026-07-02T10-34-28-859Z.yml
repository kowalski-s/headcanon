                    - paragraph [ref=f10e231]: Sorry for late comment, but I hope my two cents help. The thing that helped the length for my story was adding parts that were substantial, but not filler; a difference I learned a bit about from proofreaders harping on my faults in my story. One of my problems was having too much tell and not enough show. By incorporating dialogue into parts to add more content but still progress the story, I found new scenes coming to my mind that I hadn't considered the first time. I still have my shortcomings were I have details that don't need to exist, but repolishing helps me catch them everytime. So for me, it was polishing my story over and over that gave it length.
