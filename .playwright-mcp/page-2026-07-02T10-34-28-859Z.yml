                      - paragraph [ref=f10e281]: I'm currently writing a long fic. I have about 100 000 words written (about half of this is published) and I'm barely 1/4 into the story. There are a couple of things I learned along the way.
                      - paragraph [ref=f10e282]:
                        - text: "- First and most importantly, don't write a long story just cause you want it to be long. Your story will be as long as it needs to be. If that's 50 000 words, great. If it's 300 000, just as great. As long as it flows well and keeps the reader hooked, you're in business."
                        - text: "- Now, if you're planning on something you know will be long, plan ahead. Take notes on your characters, locations, plot points. Know where the story will be going and make sure you don't write yourself into a plot hole."
                        - text: "- Don't lose yourself in side stories. Make sure secondary plotlines are related in some way to the main story and actually bring something rich rather then take the attention away from the main action."
                        - text: "- Don't sacrifice quality of writing for lenght. Look at each chapter individually and give each the work it deserves in order to be presentable and entertaining."
                        - text: "- Finally, find ways to motivate yourself. Writing longer stories takes time. You'll get discouraged more then once and the amount of work still to be done will intimidate you. Make sure your friends can support you and believe in the project. You will need them."
