                      - paragraph [ref=f10e182]: A part of it (I think) is what kind of story you're trying to make that long. Adventure fics - in my opinion - are the easiest to make long while maintaining interest. Writing a story about a soldier who longs to be home while being conflicted about the war could probably go a long time before it got tiring/boring to readers. Think about what king of story you want to make and think about the plot itself; see if it looks like something that could last a while.
                      - paragraph [ref=f10e183]: As for describing things (he said with a sigh, feeling as though he hadn't all that he could), I think that comes with experience. Maybe inspiration as well.
