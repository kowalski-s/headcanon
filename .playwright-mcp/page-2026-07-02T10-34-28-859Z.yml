                      - paragraph [ref=f10e379]: Hi.
                      - paragraph [ref=f10e381]: "A brief guide on how to plan and execute long documents:"
                      - paragraph [ref=f10e382]: First of all, don't just sit down and write.
                      - paragraph [ref=f10e383]: (Some people can do it, and in fact Isaac Asimov was legendary on his ability to have an idea for breakfast and a full length novel for dinner, but if you could do that, you wouldn't be reading this guide. Besides, while his stories were very intellectually stimulating, he is becoming forgotten due to his characterisation always being flat and stereotypical, and his storytelling generally being very straight-forward rather than the never ending sense of hope of reading Arthur C Clarke, or the juvenile excitement of reading Robert Heinlein.)
                      - paragraph [ref=f10e384]:
                        - text: Yes, hurry up, open a new document in a text processor program and write down your ideas.
                        - text: No; unless your idea is only good for a straight-forward story, that brain dump isn't the actual story.
                        - text: "Dump as much as possible into this document: the quick outline that you surely thought of at the beginning of everything; important scenes (either as narrative or as outlines); timelines; character profiles; potential titles; et al."
                      - paragraph [ref=f10e385]: "Also very important: write down an outline. An outline is not a spoiler-free summary meant to interest the readers, but a map that will guide you as a writer, and your editors, through the setting, beginning, mayor events and conclusion of the story."
                      - paragraph [ref=f10e386]:
                        - text: "Second:"
                        - text: "Once you have finished your original dump, save the document under a usable name (say, \"(TITLE)Masterfile\" or \"(TITLE)dumpfile\"). Then make a folder in your computer under that name and transfer the original document there. Then open a second document and transfer there (cut and paste) any non-narrative story contents: basically, anything that is not a scene or an author's note; then save it as something like \"(TITLE)SupportFile\"."
                      - paragraph [ref=f10e387]:
                        - text: "Third:"
                        - text: "Organize the Support File: send executive content, such as the title and the current outline, to the top of the document. Organice other contents according to personal preference and story needs."
                        - text: "Now, going back and forth between the dump and the support documents, expand the outline. If your story's summary was \"Here's the story of the Osomov bloodline, living through the centuries with a curse that they don't know about, but they are slowly defeating...\", your first outline would have been a rough draft of significant events as the family suffers the curse and a timeline as to its defeat, and the expanded outline would have things like \"2147: the Osomov family, under the name Richardson, five individuals, is on a colony ship leading to Charon. The ship suffers an accident, but the family sacrifice themselves and fight the other adults to fill the lifeboat with the various colonists' children. A baby and a toddler Richardson survive. The Osomov birthmark is down to seven dots.\""
                      - paragraph [ref=f10e388]:
                        - text: The next step, of course, is that once you are satisfied with your expanded outline, you can see how many chapters the story is shaping up to need. Of course that it will be subject to revision, but meanwhile, you can splinter the expanded outline into chapter outlines. Or, say, have you found a good place to splinter into Books rather than Chapters?
                        - text: As you splinter the outline into chapter outlines, write your table of contents.
                        - text: Expand your chapter outlines. A chapter outline should describe the scenes that happen inside that chapter.
                      - paragraph [ref=f10e389]: And of course, as more and more non-story content is developed, you may wish to splinter parts of the Support document into their own documents, such as "(Title)Character_Profiles", "(Title)Alliances_and_Enmities_Charts", "(Title)Soma_Family_Monograph" or "(Title)Table_of_Spells".
                      - paragraph [ref=f10e390]:
                        - text: "Fourth:"
                        - text: Once you have satisfactory chapter outlines for your entire book, or books, generate Chapter documents, and then copy/paste the chapter outlines from the Support to the corresponding chapter documents, and cut/paste the scenes from the dump file into the corresponding chapters.
                        - text: If everything goes right, your Dump document should be empty right now, and your Support document should contain a copy of the entire outline for everything,
                      - paragraph [ref=f10e391]:
                        - text: "Fifth:"
                        - text: Get writing!
                        - text: "And don't forget to keep consulting and updating the Support document, so:"
                        - text: (1) You never loose track of a subplot.
                        - text: (2) You can maintain internal consistency, regardless of how badly you twist the plot.
                        - text: (3) You can seed plot elements and plot devices half a book before they ever become relevant.
                      - paragraph [ref=f10e392]: On December, a black old dude receives a magnesium hip replacement. On February, the town receives a Neo Nazi injection, who take refuge on an old, abandoned factory, and the authorities don't bother because they look like just hobos. On June, the Neo Nazis toss the old man's corpse on a chimney, the magnesium implant flares up very violently and sets the inside of the chimney on fire. This brings down the emergency services, which first detain the supposed hobos for destruction or something, but then leads to their arrest once the old man's partial corpse is found.
