                        - link " Twiface" [ref=f10e151] [cursor=pointer]:
                          - /url: "#comment/3640875"
                        - text: Ever since I discovered Longfics, I've always wanted to write one myself. I find that writing long isn't too much a problem for me since I always seem to write more than I intend to, but writing a Longfic that's good is what I'm stuck on.
                      - paragraph [ref=f10e152]:
                        - text: How do I make a Longfic that actually keeps the reader's attention? I'm kind of an impatient reader myself, and I worry that my readers will get bored after they're only 10,000 words into my stories. Somehow J.K. Rowling and J.R.R. Tolkien got epically long stories of their own published, but I can't rely on Hollywood to turn mine into movies. I'm also astounded at how some people can write
                        - link "fanfictions approaching a million words long and still attract cult followings" [ref=f10e153] [cursor=pointer]:
                          - /url: /story/47300/fallout-equestria-murky-number-seven
                        - text: .
                      - paragraph [ref=f10e154]:
                        - text: I have doubts about my own writing ability. I suck at describing things ("The chair was yellow," "He felt sad,") and there's so much action I can write before things get repetitive. How can I improve my own 'writing endurance' and how do these guys keep their readers hooked? I really need the advice, or else my only hope of breaking the one million word benchmark would be to resort to
                        - link "philosophical preaching" [ref=f10e155] [cursor=pointer]:
                          - /url: http://en.wikipedia.org/wiki/Atlas_Shrugged
                        - text: or the shameful story extension tactics of
                        - link "this guy." [ref=f10e156] [cursor=pointer]:
                          - /url: /story/30328/the-longest-trollfic-ever
