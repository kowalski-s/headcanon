                      - paragraph [ref=f10e352]:
                        - link " Twiface" [ref=f10e353] [cursor=pointer]:
                          - /url: "#comment/3640875"
                        - text: So, this response is a bit late, but here's my advice as someone who's written a few professional works which are more than 50k words. When I started writing Displaced Into Nothing, I blocked out the entire story as an outline, doing various bit of research, figuring out the nature of plot points that would come late in the story (Chapters 9 and 10) and figuring out how to set them up early on. That's why Chapter 6 has a scene where, out of nowhere, Meta finds a book about her own life, because it becomes relevant in Chapter 9. Knowing how to put in little details early on that back up later events, and don't contradict them, is one of the most important things in a long story.
                      - paragraph [ref=f10e354]: "The other thing is being ready for a long haul: I've resigned to the fact that I won't be able to get out chapters faster than a certain pace, so I assumed this story would be going for a few months. Setbacks have pushed me back about a month, but hopefully I'll be done soon. The biggest issue I have is that, near the end, my interest in a story starts to wane: right now, I've been writing little snippets of my next story, and it's been distracting me from the current one, because in my mind, I've already dealt with it. The allure of those clever plot points from unwritten chapters has worn off at this point, and so I have to work to stay focused on actually getting them out."
                      - paragraph [ref=f10e355]: "Writing WELL helps with that: I'm more driven by the fact that I've got one of the most popular HiE fics on the site right now (and I'm pretty sure it's at least one of the top 10 smartest HiE fics of all time) and every time I post a chapter it spends about 12 hours in the Featured box and I get about 50 comments about how something in the chapter was cool or thought provoking. It's praise like that that really keeps me going."
                      - paragraph [ref=f10e356]: That's just my thoughts on the matter for you.
                      - paragraph [ref=f10e357]: "Edit: Oh wow, I saw this was from September... I didn't see it was from 2014!"
